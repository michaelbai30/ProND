{% extends "base.html" %}

{% block title %}Create Session — ProND{% endblock %}

{% block content %}
<h2>Create a Session</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Create Session</button>
    <a href="{% url 'session_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
